# Netlify build for KAIROS. Repo root is browser-game-intel/; app lives in app/.
[build]
  base = "app"
  command = "npm run build"
  publish = "web/dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback (the /api/* function declares its own path and takes precedence).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
