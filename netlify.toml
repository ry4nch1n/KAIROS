# Netlify build for KAIROS. Repo root = browser-game-intel/; the app is in app/.
# No `base` — all paths are root-relative and the command installs/builds inside app/,
# so resolution is identical for CLI deploys and git-linked cloud builds.
[build]
  command = "npm --prefix app install && npm --prefix app run build"
  publish = "app/web/dist"
  edge_functions = "app/netlify/edge-functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "app/netlify/functions"
  node_bundler = "esbuild"

# SPA fallback (the /api/* function declares its own path and takes precedence).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
