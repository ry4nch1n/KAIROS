name: Daily Crawl
on:
  schedule:
    - cron: "0 20 * * *" # 20:00 UTC = 04:00 SGT (UTC+8) daily
  workflow_dispatch: {} # lets you trigger a run by hand from the Actions tab

# ── Actions budget (private repo free tier = 2,000 min/month, ~30-31 daily runs) ──
# MEASURED on run 28423375066 (2026-06-30): CrazyGames 250 ≈ 19 min, Poki 250 ≈ 20 min,
# Steam ≈ 5.6 s/app on Actions runners (3 endpoints + 1.5s politeness). migrate+install ≈ 2 min.
# Steam 200 ≈ 19 min → total ≈ 60 min/run → ~1,800/mo (30) / ~1,860/mo (31): under cap,
# ~150-200 min headroom for manual re-runs. (NOTE: the first run used Steam 300 ≈ 28 min →
# ~68 min/run ≈ 2,050/mo, OVER cap — reduced to 200 below.)
# To go bigger: make the repo PUBLIC (unlimited Actions) and raise the limits — no secrets
# live in the code (they're in Actions/Netlify env), so publishing is safe.

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Ensure Neon schema is current (idempotent — adds Phase 2 Steam columns)
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Crawl CrazyGames into Neon (append-only snapshot)
        run: npm run crawl:crazygames
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_LIMIT: "250"
      - name: Crawl Poki into Neon (append-only snapshot)
        run: npm run crawl:poki
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_LIMIT: "250"
      - name: Crawl Steam (PC) into Neon (append-only snapshot)
        run: npm run crawl:steam
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_LIMIT: "200"
      # Recency + accuracy gate: fails the run (loud alert) if the crawl produced degenerate
      # data (empty indie seed → all-AAA, broken date parser → null dates, collapsed
      # comparables). Append-only load already happened, so this detects rather than prevents —
      # but a red run surfaces the silent-bad-data failure mode that "green crawl" would hide.
      - name: Steam data-quality gate (recency + accuracy)
        run: npm run check:steam
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
